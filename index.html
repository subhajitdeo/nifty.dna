<!DOCTYPE html>
<html>
<head>
    <title>NIFTY Test</title>
</head>
<body>
    <h2>Testing Supabase Connection</h2>
    <div id="status">Loading...</div>
    <div id="data"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script>
        // =============================================
        // SIMPLE TEST - NO DEPENDENCIES
        // =============================================
        
        const URL = 'https://okxehbgomqsmfbzpsgrm.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9reGVoYmdvbXFzbWZienBzZ3JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODU4NTMsImV4cCI6MjA5NzQ2MTg1M30.8KCec5lIzhha3mRx3b3shRF8bH7-rfVDT3KktR95TBc';

        const status = document.getElementById('status');
        const dataDiv = document.getElementById('data');

        // Step 1: Check if script loaded
        status.innerHTML = 'Step 1: Script loaded ✅<br>';

        // Step 2: Check if supabase is available
        if (typeof supabase === 'undefined' && typeof window.supabase === 'undefined') {
            status.innerHTML += 'Step 2: Supabase library NOT loaded ❌';
            dataDiv.innerHTML = 'Please check internet connection';
        } else {
            status.innerHTML += 'Step 2: Supabase library loaded ✅<br>';

            // Step 3: Create client
            try {
                const sb = window.supabase.createClient(URL, KEY);
                status.innerHTML += 'Step 3: Client created ✅<br>';

                // Step 4: Fetch data
                status.innerHTML += 'Step 4: Fetching data...<br>';

                sb
                    .from('option_analysis')
                    .select('*')
                    .limit(1)
                    .then(({ data, error }) => {
                        if (error) {
                            status.innerHTML += 'Step 5: ❌ ERROR<br>';
                            dataDiv.innerHTML = '<pre style="color:red;">' + JSON.stringify(error, null, 2) + '</pre>';
                        } else if (data && data.length > 0) {
                            status.innerHTML += 'Step 5: ✅ DATA FOUND!<br>';
                            dataDiv.innerHTML = '<pre>' + JSON.stringify(data[0], null, 2) + '</pre>';
                        } else {
                            status.innerHTML += 'Step 5: ⚠️ No data found<br>';
                            dataDiv.innerHTML = 'Table is empty';
                        }
                    })
                    .catch(err => {
                        status.innerHTML += 'Step 5: ❌ EXCEPTION<br>';
                        dataDiv.innerHTML = '<pre style="color:red;">' + err.message + '</pre>';
                    });

            } catch (err) {
                status.innerHTML += 'Step 3: ❌ Client creation failed<br>';
                dataDiv.innerHTML = '<pre style="color:red;">' + err.message + '</pre>';
            }
        }
    </script>
</body>
</html>
